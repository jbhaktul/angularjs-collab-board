<!DOCTYPE html>
<html ng-app="app">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<head>
	<title>AngularJS CollabBoard</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/css/app.css">
</head>

<body ng-controller="MainCtrl">
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
		<div class="container-fluid px-4">
			<a class="navbar-brand fw-bold" href="#">CollabBoard</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNavBar" aria-controls="siteNavBar" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse justify-content-end" id="siteNavBar">
				<button id="createButton" ng-click="createNote()" class="btn btn-primary px-4 rounded-pill">New Note</button>
			</div>
		</div>
	</nav>
	
	<div class="container main-container mt-5 pt-5">
		<div sticky-note ng-repeat="note in notes" note="note" class="card sticky-note-class shadow-sm border-0" ondelete="deleteNote(id)">
			<div class="card-body p-3">
				<div class="d-flex justify-content-between align-items-center mb-2">
					<input ng-model="note.title" ng-change="updateNote(note)" type="text" class="title fw-bold" placeholder="Note Title"></input>
					<button type="button" class="btn-close" ng-click="deleteNote(note.id)" aria-label="Close"></button>
				</div>
				<textarea ng-model="note.body" rows="6" ng-change="updateNote(note)" class="body form-control border-0 bg-transparent px-0" placeholder="Type your note here...">{{note.body}}</textarea>
			</div>
		</div>
	</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.3/jquery-ui.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>
	<script src="/js/collab-board.js"></script>
</body>

</html>
